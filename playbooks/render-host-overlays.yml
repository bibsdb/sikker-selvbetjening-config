- name: Render config overlay per build target
  hosts: localhost
  connection: local
  gather_facts: false

  pre_tasks:
    - name: Validate target_groups input
      assert:
        that:
          - target_groups is defined
          - target_groups | length > 0
        fail_msg: "target_groups must be provided"

    - name: Normalize target groups list
      set_fact:
        normalized_target_groups: "{{ target_groups.split(',') if target_groups is string else target_groups }}"

    - name: Load group vars for target groups in order
      include_vars:
        file: "../group_vars/{{ item }}.yml"
        name: overlay_group_vars
      loop: "{{ normalized_target_groups }}"
      register: loaded_group_vars

    - name: Initialize merged overlay sections
      set_fact:
        overlay_sections: {}

    - name: Merge overlay sections in group order
      set_fact:
        overlay_sections: "{{ overlay_sections | combine(item.ansible_facts.overlay_group_vars, recursive=True) }}"
      loop: "{{ loaded_group_vars.results }}"

    - name: Set build root path
      set_fact:
        build_root: "{{ playbook_dir }}/../build/{{ build_name }}"

    - name: Initialize rendered overlay sections
      set_fact:
        rendered_overlay_sections: "{{ overlay_sections }}"

    - name: Build section entries for generic processing
      set_fact:
        overlay_section_entries: "{{ (overlay_section_entries | default([])) + [{'section': item.key, 'vars': (item.value | dict2items)}] }}"
      loop: "{{ overlay_sections | dict2items }}"
      when: item.value is mapping

    - name: Normalize file variable values to destination-relative paths
      set_fact:
        rendered_overlay_sections: "{{ rendered_overlay_sections | combine({item.0.section: {item.1.key: (item.1.value | regex_replace('^assets/', ''))}}, recursive=True) }}"
      loop: "{{ query('subelements', overlay_section_entries | default([]), 'vars') }}"
      when:
        - item.1.key is regex('_file$')
        - item.1.value is string

  tasks:
    - name: Create build usr tree
      file:
        path: "{{ build_root }}/usr/share/sikker-selvbetjening"
        state: directory
        recurse: true

    - name: Create directories for file variables
      file:
        path: "{{ build_root }}/usr/share/sikker-selvbetjening/{{ ((item.1.value | regex_replace('^assets/', '')) | dirname) }}"
        state: directory
        recurse: true
      loop: "{{ query('subelements', overlay_section_entries | default([]), 'vars') }}"
      when:
        - item.1.key is regex('_file$')
        - item.1.value is string
        - (item.1.value | regex_replace('^assets/', '')) | dirname != '.'

    - name: Copy files referenced by _file variables from assets
      copy:
        src: "{{ playbook_dir }}/../assets/{{ item.1.value | regex_replace('^assets/', '') }}"
        dest: "{{ build_root }}/usr/share/sikker-selvbetjening/{{ item.1.value | regex_replace('^assets/', '') }}"
      loop: "{{ query('subelements', overlay_section_entries | default([]), 'vars') }}"
      when:
        - item.1.key is regex('_file$')
        - item.1.value is string

    - name: Render section config files
      template:
        src: "{{ playbook_dir }}/../templates/section.conf.j2"
        dest: "{{ build_root }}/usr/share/sikker-selvbetjening/{{ item.key }}.conf"
      loop: "{{ rendered_overlay_sections | dict2items }}"
      vars:
        section_values: "{{ item.value }}"
      when: item.value is mapping
