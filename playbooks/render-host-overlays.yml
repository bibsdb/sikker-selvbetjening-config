- name: Render config overlay per build target
  hosts: localhost
  connection: local
  gather_facts: false

  pre_tasks:
    - name: Validate target_groups input
      assert:
        that:
          - target_groups is defined
          - target_groups | length > 0
        fail_msg: "target_groups must be provided"

    - name: Normalize target groups list
      set_fact:
        normalized_target_groups: "{{ target_groups.split(',') if target_groups is string else target_groups }}"

    - name: Load group vars for target groups in order
      include_vars:
        file: "../group_vars/{{ item }}.yml"
      loop: "{{ normalized_target_groups }}"

    - name: Set build root path
      set_fact:
        build_root: "{{ playbook_dir }}/../build/{{ build_name }}"

  tasks:
    - name: Create build usr tree
      file:
        path: "{{ build_root }}/usr/share/sikker-selvbetjening"
        state: directory
        recurse: true

    - name: Create NetworkManager directory
      file:
        path: "{{ build_root }}/usr/etc/NetworkManager/system-connections"
        state: directory
        recurse: true

    - name: Create wallpaper backgrounds directory
      file:
        path: "{{ build_root }}/usr/share/backgrounds"
        state: directory
        recurse: true

    - name: Render printer config
      template:
        src: "{{ playbook_dir }}/../templates/printer.conf.j2"
        dest: "{{ build_root }}/usr/share/sikker-selvbetjening/printer.conf"
      when:
        - printer_name is defined
        - printer_ip is defined

    - name: Render wallpaper config
      template:
        src: "{{ playbook_dir }}/../templates/wallpaper.conf.j2"
        dest: "{{ build_root }}/usr/share/sikker-selvbetjening/wallpaper.conf"
      when: wallpaper_file is defined

    - name: Render wifi config
      template:
        src: "{{ playbook_dir }}/../templates/wifi.nmconnection.j2"
        dest: "{{ build_root }}/usr/etc/NetworkManager/system-connections/wifi.nmconnection"

    - name: Copy wallpaper asset
      copy:
        src: "{{ playbook_dir }}/../assets/{{ wallpaper_file }}"
        dest: "{{ build_root }}/usr/share/backgrounds/{{ wallpaper_file }}"
      when: wallpaper_file is defined
