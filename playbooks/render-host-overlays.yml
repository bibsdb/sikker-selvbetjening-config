- name: Render config overlay per build target
  hosts: localhost
  connection: local
  gather_facts: false

  pre_tasks:
    - name: Validate target_groups input
      assert:
        that:
          - target_groups is defined
          - target_groups | length > 0
        fail_msg: "target_groups must be provided"

    - name: Normalize target groups list
      set_fact:
        normalized_target_groups: "{{ target_groups.split(',') if target_groups is string else target_groups }}"

    - name: Load group vars for target groups in order
      include_vars:
        file: "../../config/group_vars/{{ item }}.yml"
        name: overlay_group_vars
      loop: "{{ normalized_target_groups }}"
      register: loaded_group_vars

    - name: Initialize merged overlay sections
      set_fact:
        overlay_sections: {}

    - name: Merge overlay sections in group order
      set_fact:
        overlay_sections: "{{ overlay_sections | combine(item.ansible_facts.overlay_group_vars, recursive=True) }}"
      loop: "{{ loaded_group_vars.results }}"

    - name: Set build root path
      set_fact:
        build_root: "{{ playbook_dir }}/../build/{{ build_name }}"

    - name: Normalize overlay data and collect typed asset references
      shell: |
        python3 - <<'PY'
        import json
        import os
        import posixpath
        import sys

        data = json.loads(os.environ["OVERLAY_JSON"])
        file_paths = []

        def normalize(value):
            if isinstance(value, dict):
            # Typed asset reference format:
            #   some_key:
            #     type: asset
            #     path: bg-default.jpg
            if value.get("type") == "asset" and isinstance(value.get("path"), str):
              raw_path = value["path"]
              if raw_path.startswith("/"):
                raise ValueError(f"Asset path must be relative, got absolute path: {raw_path}")

              rel_path = raw_path[7:] if raw_path.startswith("assets/") else raw_path
              rel_path = posixpath.normpath(rel_path)

              if rel_path in (".", "") or rel_path.startswith("../") or "/../" in rel_path:
                raise ValueError(f"Asset path escapes assets root: {raw_path}")

              file_paths.append(rel_path)
              return f"assets/{rel_path}"

                normalized = {}
                for key, subvalue in value.items():
                    normalized_value = normalize(subvalue)
              normalized[key] = normalized_value
                return normalized

            if isinstance(value, list):
                return [normalize(item) for item in value]

            return value

        try:
          normalized_overlay = normalize(data)
        except ValueError as exc:
          print(str(exc), file=sys.stderr)
          raise SystemExit(1)

        print(
            json.dumps(
                {
                    "rendered_overlay_sections": normalized_overlay,
                    "overlay_file_paths": sorted(set(file_paths)),
                }
            )
        )
        PY
      args:
        executable: /bin/bash
      environment:
        OVERLAY_JSON: "{{ overlay_sections | to_json }}"
      register: overlay_processing
      changed_when: false

    - name: Parse normalized overlay payload
      set_fact:
        overlay_processing_data: "{{ overlay_processing.stdout | from_json }}"

    - name: Set rendered overlay sections
      set_fact:
        rendered_overlay_sections: "{{ overlay_processing_data.rendered_overlay_sections }}"
        overlay_file_paths: "{{ overlay_processing_data.overlay_file_paths }}"

  tasks:
    - name: Create build usr tree
      file:
        path: "{{ build_root }}/usr/share/sikker-selvbetjening/config"
        state: directory
        recurse: true

    - name: Create directories for file variables
      file:
        path: "{{ build_root }}/usr/share/sikker-selvbetjening/config/assets/{{ item | dirname }}"
        state: directory
        recurse: true
      loop: "{{ overlay_file_paths | default([]) }}"
      when:
        - item | dirname != '.'

    - name: Copy files referenced by _file variables from assets
      copy:
        src: "{{ playbook_dir }}/../../config/assets/{{ item }}"
        dest: "{{ build_root }}/usr/share/sikker-selvbetjening/config/assets/{{ item }}"
      loop: "{{ overlay_file_paths | default([]) }}"

    - name: Render section config files as YAML
      template:
        src: "{{ playbook_dir }}/../templates/section.yml.j2"
        dest: "{{ build_root }}/usr/share/sikker-selvbetjening/config/{{ item.key }}.yml"
      loop: "{{ rendered_overlay_sections | dict2items }}"
      vars:
        section_values: "{{ item.value }}"
      when: item.value is mapping
