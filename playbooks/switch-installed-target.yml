- name: Switch installed target/version with bootc
  hosts: all
  gather_facts: false

  pre_tasks:
    - name: Load build target definitions
      include_vars:
        file: "../inventory/build_targets.yml"
        name: build_target_data

    - name: Initialize detected target list
      set_fact:
        detected_bootc_targets: []

    - name: Detect target from host group membership
      set_fact:
        detected_bootc_targets: "{{ detected_bootc_targets + [item.image_name] }}"
      loop: "{{ build_target_data.targets }}"
      when:
        - item.groups is defined
        - (item.groups | intersect(group_names) | length) > 0

    - name: Validate detected targets
      assert:
        that:
          - detected_bootc_targets | length > 0
          - detected_bootc_targets | length <= 1
        fail_msg: >-
          Could not uniquely detect target from group membership for {{ inventory_hostname }}.
          Found: {{ detected_bootc_targets }}. Set bootc_target explicitly in inventory if needed.

    - name: Resolve desired bootc target and version
      set_fact:
        desired_bootc_target: "{{ bootc_target | default(detected_bootc_targets[0]) }}"
        desired_bootc_version: "{{ bootc_target_version | default(bootc_default_version) }}"

    - name: Build desired bootc image reference
      set_fact:
        desired_bootc_image: "{{ bootc_image_repo }}/{{ desired_bootc_target }}:{{ desired_bootc_version }}"

  tasks:
    - name: Show computed switch target
      debug:
        msg: "Switching {{ inventory_hostname }} to {{ desired_bootc_image }}"

    - name: Switch image with bootc
      command:
        argv:
          - bootc
          - switch
          - "{{ desired_bootc_image }}"
      register: bootc_switch_result
      changed_when: true
      when: bootc_apply | bool

    - name: Show bootc switch output
      debug:
        var: bootc_switch_result.stdout_lines
      when: bootc_apply | bool

    - name: Schedule reboot after switch for local ansible-pull runs
      command:
        argv:
          - systemd-run
          - --on-active=5
          - --service-type=oneshot
          - systemctl
          - reboot
      changed_when: true
      when:
        - bootc_apply | bool
        - bootc_reboot_after_switch | bool
        - ansible_connection | default('ssh') == 'local'

    - name: Reboot after switch when requested
      reboot:
        reboot_timeout: 600
      when:
        - bootc_apply | bool
        - bootc_reboot_after_switch | bool
        - ansible_connection | default('ssh') != 'local'
