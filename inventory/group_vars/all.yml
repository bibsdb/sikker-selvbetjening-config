# ansible-pull runs locally on each PC.
ansible_connection: local
ansible_become: true

# Registry/repository used by images built from this project.
bootc_image_repo: ghcr.io/bibsdb/sikker-selvbetjening-config

# Fallback tag when host-specific version is not set.
bootc_default_version: latest

# Set to false to only print the computed switch command.
bootc_apply: true

# Optional immediate reboot after switching.
bootc_reboot_after_switch: false
