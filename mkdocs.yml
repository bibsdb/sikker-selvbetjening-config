site_name: Configuration Schema Documentation
site_description: JSON Schema documentation for sikker-selvbetjening configuration overlays
site_url: https://bibsdb.github.io/sikker-selvbetjening-config/
repo_url: https://github.com/bibsdb/sikker-selvbetjening-config
repo_name: sikker-selvbetjening-config

theme:
  name: material
  logo: https://raw.githubusercontent.com/bibsdb/bibsdb-icons/main/bibsdb-icon.svg
  favicon: https://raw.githubusercontent.com/bibsdb/bibsdb-icons/main/bibsdb-icon.svg
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/lightbulb
        name: Switch to light mode

plugins:
  - search
  - macros

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Schemas:
    - Root Schema (group-vars): schemas/root.md
    - Printer Configuration: schemas/printer.md
    - WiFi Configuration: schemas/wifi.md
  - About: about.md

# Docs folder
docs_dir: docs
site_dir: site
