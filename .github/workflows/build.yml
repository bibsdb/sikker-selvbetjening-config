name: Build group config images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Install validation dependencies
        run: pip install pyyaml check-jsonschema

      - name: Validate group_vars against schema from base image
        run: bash ./scripts/validate-group-vars-schema-from-image.sh

      - name: Validate cross-field constraints
        run: python3 ./scripts/validate-group-vars.py

      - name: Discover build targets
        id: discover
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          import yaml

          build_targets = yaml.safe_load(Path("config/inventory/build_targets.yml").read_text()) or {}

          if not isinstance(build_targets, dict):
            raise SystemExit("config/inventory/build_targets.yml must be a mapping with a top-level 'targets' list")

          targets = build_targets.get("targets", [])

          if not isinstance(targets, list):
            raise SystemExit("config/inventory/build_targets.yml must define a list under 'targets'")

          entries = []
          seen_image_names = set()

          for item in targets:
            if not isinstance(item, dict):
              raise SystemExit("Each target in config/inventory/build_targets.yml must be a mapping")

            target_name = item.get("name")
            description = item.get("description")
            groups = item.get("groups")
            image_name = item.get("image_name")

            if not target_name:
              raise SystemExit("Each target must define 'name'")

            if not description:
              raise SystemExit(f"Target '{target_name}' is missing 'description'")

            if not isinstance(groups, list) or not groups:
              raise SystemExit(f"Target '{target_name}' must define a non-empty 'groups' list")

            if any(not isinstance(group_name, str) or not group_name for group_name in groups):
              raise SystemExit(f"Target '{target_name}' contains invalid group names")

            if len(set(groups)) != len(groups):
              raise SystemExit(f"Target '{target_name}' contains duplicate groups")

            if not image_name:
              raise SystemExit(f"Target '{target_name}' is missing 'image_name'")

            if image_name in seen_image_names:
              raise SystemExit(f"Duplicate image_name '{image_name}'")
            seen_image_names.add(image_name)

            for group_name in groups:
              if not Path(f"config/group_vars/{group_name}.yml").exists():
                raise SystemExit(f"Missing config/group_vars/{group_name}.yml for target '{target_name}'")

            entries.append(
              {
                "name": target_name,
                "description": description,
                "groups_csv": ",".join(groups),
                "image": image_name,
              }
            )

          if not entries:
            raise SystemExit("No build targets found in config/inventory/build_targets.yml")

          print(f"matrix={json.dumps({'include': entries})}")
          PY

  build:
    needs: prepare
    runs-on: ubuntu-latest
    name: Build ${{ matrix.name }}
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Install ansible
        run: pip install ansible

      - name: Render and build
        run: ./scripts/build-group-image.sh "${{ matrix.groups_csv }}" "${{ matrix.image }}"
